<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../styles/cadlog.css" type="text/css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO</title>
</head>
<body>
    
    <div id="conteiner">
    <h1>Cadastro</h1>
    <form id="cadastroForm">

        <label for="">Nome</label>
        <input type="text" id="nome" placeholder="Digite seu nome">
        <p class="error" id="nomeError"></p>
    
        <label for="">Email</label>
        <input type="email" id="email" placeholder="Digite seu email">
        <p class="error" id="emailError"></p>
        
        <label for="">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha">
        <p class="error" id="passError"></p>
        
        <label for="">Confirmar senha</label>
        <input type="password" id="confirmPassword" placeholder="Confirme sua senha">
        <p class="error" id="confirmPassError"></p>
    
        <button type="submit">Cadastrar</button>
        <p class="error" id="feedback"></p>
        <p>Já tem uma conta? <a href="../pages/login.html">Faça login</a></p>
    </form>
    </div>
    <script src="../scripts/auth/cadastro.js"></script>
</body>
</html>
